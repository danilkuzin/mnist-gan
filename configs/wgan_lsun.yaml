model: dcgan

dataset:
  name: lsun
  image_size: 64
  channels: 3

training:
  epochs: 5
  batch_size: 64
  seed: 100
  n_critic: 5
  weight_clip: 0.01

generator:
  z_dim: 100
  num_features: 64
  generator_loss_type: non_saturating
  pretrain_epochs: 0

discriminator: 
  num_features: 64
  discriminator_loss_type: mean

visualise:
  plot_epochs: 1
  plot_steps: 100

optimizers:
  discriminator:
    name: "RMSprop"
    params:
      lr: 0.00005
  generator:
    name: "RMSprop"
    params:
      lr: 0.00005
      
schedulers: null